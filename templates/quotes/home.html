{% extends "base.html" %}

{% block title %}QuoteBox — Daily Inspiration{% endblock %}

{% block content %}
<style>
  .quote-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 3rem;
    margin: 2rem 0;
    position: relative;
    transition: transform 0.2s, box-shadow 0.2s;
  }

  .quote-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
  }

  .quote-card::before {
    content: '"';
    font-size: 8rem;
    color: var(--quote-mark);
    position: absolute;
    top: -1rem;
    left: 1.5rem;
    line-height: 1;
    font-family: Georgia, serif;
    opacity: 0.5;
  }

  .quote-text {
    font-size: 1.5rem;
    line-height: 1.6;
    color: var(--text-primary);
    margin-bottom: 1.5rem;
    font-weight: 400;
    position: relative;
    z-index: 1;
  }

  .quote-author {
    font-size: 0.9rem;
    color: var(--accent);
    font-weight: 500;
    letter-spacing: 0.02em;
  }

  .quote-author::before { content: "— "; }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    margin-top: 1.5rem;
    padding: 0.75rem 1.5rem;
    background: linear-gradient(135deg, var(--accent), var(--accent-hover));
    color: white;
    text-decoration: none;
    border-radius: 12px;
    font-weight: 600;
    font-size: 0.875rem;
    transition: all 0.2s;
    border: none;
    cursor: pointer;
  }

  .btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 20px rgba(139, 92, 246, 0.3);
  }

  .empty {
    text-align: center;
    padding: 4rem 2rem;
    background: var(--bg-card);
    border-radius: 20px;
    border: 1px solid var(--border);
  }

  .empty p { color: var(--text-secondary); margin-bottom: 1rem; }
  .empty a { color: var(--accent); text-decoration: none; font-weight: 500; }
  .empty a:hover { text-decoration: underline; }
</style>

<h1><i class="fas fa-quote-left"></i> Today's Quote</h1>

{% if quote %}
  <div class="quote-card">
    <p class="quote-text">{{ quote.text }}</p>
    <p class="quote-author">{{ quote.author }}</p>
  </div>
  <a href="{% url 'home' %}" class="btn">↻ New Random Quote</a>
{% else %}
  <div class="empty">
    <p><i class="fas fa-quote-right"></i> No approved quotes yet.</p>
    <p><a href="{% url 'add_quote' %}">Add the first one →</a></p>
  </div>
{% endif %}
{% endblock %}
